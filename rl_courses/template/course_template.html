<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Template - RL Zero to Hero</title>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="breadcrumb">
                <a href="../../index.html">Home</a> → 
                <a href="../index.html">Level</a> → 
                <span>Course Title</span>
            </div>
            <h1>Course Title</h1>
            <p class="course-meta">Course X of 100 | Level: Beginner/Intermediate/Advanced/Expert</p>
        </header>

        <nav class="course-nav">
            <button id="prevCourse">← Previous</button>
            <button id="nextCourse">Next →</button>
        </nav>

        <section class="theory">
            <h2>📚 Theory</h2>
            <div class="theory-content">
                <!-- Theory content here -->
            </div>
        </section>

        <section class="controls">
            <h2>🎮 Interactive Demo</h2>
            <div class="control-panel">
                <!-- Controls here -->
            </div>
        </section>

        <section class="visualization">
            <h2>📊 Visualization</h2>
            <div id="mainViz" class="viz-container"></div>
        </section>

        <section class="metrics">
            <h2>📈 Numerical Results</h2>
            <div id="metricsPanel" class="metrics-grid">
                <!-- Metrics here -->
            </div>
        </section>

        <section class="code">
            <h2>💻 Implementation</h2>
            <pre><code id="codeBlock">
// Code implementation
            </code></pre>
        </section>

        <section class="exercises">
            <h2>✏️ Exercises</h2>
            <div class="exercise-list">
                <!-- Exercises here -->
            </div>
        </section>
    </div>

    <script src="../shared/utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
